<html>

		<title>User Login / Signup - dry.gg</title>

		<style type="text/css">
		:root {
			--dark-blue: #285680;
			--primary-color: #7ED7FF;
			--secondary-color: #98DFFF;
		}
		body {
			margin: 0;
			padding: 0;
			background-color: #1c1c1c;
			font-family: 'Avenir',-apple-system,BlinkMacSystemFont,"Segoe UI","Roboto","Oxygen","Ubuntu","Helvetica Neue",Arial,sans-serif;
		}
		.bg {
			position: fixed;
			z-index: -9999;
			width: 100vw;
			height: 100vh;
			top: calc(50% - 250px);
			background-image: url('https://dry.gg/media/stars.svg');
			background-repeat: repeat-x;
		}
		.main {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, calc(-50% - 60px));
		}
		.header-graphic {
			position: absolute;
			z-index: -999;
			top: calc(50% - 200px);
			left: -150px;
			width: 400px;
			opacity: 1;
			animation: rotate 60s linear infinite;
		}
		.header-graphic svg {
			width: 100%;
			fill: #f0f0f0;
		}
		.logo {
			padding: 30px 0px;
		}
		.logo svg {
			fill: transparent;
			stroke: #eee;
			height: 75px;
		}
		.user-action-table {
			display: table;
			width: 96vw;
			max-width: 960px;
		}
		.user-login, .user-signup {
			display: table-cell;
			width: 50%;
			padding: 12px;
		}
		.user-login {
			border-right: 1px solid #444;
		}
		.action-table-heading {
			font-weight: bold;
			font-size: 30px;
			color: #eee;
		}
		.action-table-heading svg {
			height: 30px;
			vertical-align: baseline;
			transform: rotate(-45deg);
		}
		.password-input-box {
			margin-left: -4px;
			position: relative;
			width: calc(100% - 24px);
		}
		.password-input-box input[type="text"] {
			width: 100%;
		}
		.password-input-box input[type="password"] {
			width: 100%;
		}
		.password-display-toggle {
			padding: 6px;
			cursor: pointer;
			position: absolute;
			right: 6px;
			top: calc(50%);
			z-index: 999;
			transform: translate(0px, -50%);
		}
		.password-display-toggle svg {
			width: 21px;
			fill: #aaa;
		}
		.unhide-password {
			display: block;
		}
		.hide-password {
			display: none;
		}
		.action-table-input {
			display: block;
			width: calc(100% - 24px);
			height: 36px;
			margin-top: 12px;
			text-indent: 12px;
			font-size: 18px;
			color: #333;
			padding: 7px 0px 4px 0px;
		}
		.valid-input {
			border: 2px solid #eee;
			border-radius: 5px;
		}
		.valid-input:focus {
			outline: 0;
			box-shadow: 0 0 3px 2px var(--primary-color);
		}
		.invalid-input {
			border: 2px solid #d90000;
			border-radius: 5px 5px 0px 0px;
		}
		.invalid-input:focus {
			outline: 0;
			box-shadow: 0 0px 3px 0.5px #d90000;
		}
		.form-error {
			display: none;
			border-radius: 0px 0px 5px 5px;
			background-color: #d90000;
			width: calc(100% - 44px);
			text-align: left;
			color: #fff;
			padding: 2px 12px 6px 12px;
			font-size: 13px;
		}
		.action-table-button {
			display: block;
			cursor: pointer;
			width: calc(100% - 24px);
			height: 48px;
			margin-top: 12px;
			border-radius: 5px;
			font-size: 18px;
			font-weight: bold;
			color: #fff;
			border: 0px;
			background-color: var(--dark-blue);
		}
		.action-table-button:hover:enabled {
			background-color: #000;
		}
		.action-table-button:focus {
			outline: 0;
		}
		.action-table-button svg {
			fill: #fff;
			height: 36px;
			vertical-align: bottom;
			animation: 0.5s rotate infinite linear;
		}
		.action-table-button:disabled {
			cursor: not-allowed;
		}
		input[type="text"]:disabled, input[type="password"]:disabled {
			cursor: not-allowed;
			background-color: #eee;
		}
		.link {
			color: #fff;
			font-weight: bold;
			text-decoration: none;
		}
		.link:hover {
			text-decoration: underline;
		}
		.forgot-password {
			cursor: pointer;
			border: 0;
			color: #fff;
			padding: 10px 12px 8px 12px;
			display: block;
			font-size: 15px;
			margin-top: 24px;
			font-weight: bold;
			border-radius: 5px;
			white-space: nowrap;
			width: fit-content;
			background-color: #333;
		}
		.forgot-password:focus {
			outline: 0;
		}
		.terms-accepted {
			margin-top: 18px;
			font-size: 13px;
			color: #fff;
		}
		.forgot-password-dialog-container {
			display: none;
			position: fixed;
			z-index: 111111;
			top: 0px;
			left: 0px;
			width: 100vw;
			height: 100vh;
			background-color: rgba(0, 0, 0, 0.9);
		}
		.forgot-password-dialog {
			display: none;
			position: fixed;
			z-index: 333333;
			top: 50%;
			left: 50%;
			width: 360px;
			height: auto;
			padding: 24px;
			font-size: 18px;
			border-radius: 5px;
			background-color: #fff;
			transform: translate(-50%, -50%);
		}
		.forgot-password-dialog-title {
			color: #1c1c1c;
			font-size: 24px;
			font-weight: bold;
			text-align: center;
		}
		.forgot-password-dialog-input {
			display: block;
			width: calc(100% - 2px);
			height: 42px;
			margin-top: 12px;
			text-indent: 12px;
			font-size: 18px;
			color: #333;
			border-radius: 5px;
			padding: 4px 0px 2px 0px;
		}
		.forgot-password-dialog-input-valid {
			border: 1px solid #ccc;
		}
		.forgot-password-dialog-input-invalid {
			border: 1px solid #d90000;
		}
		.forgot-password-dialog-input-valid:focus {
			outline: 0;
			box-shadow: 0 0 3px 2px var(--primary-color);
		}
		.forgot-password-dialog-input-invalid:focus {
			outline: 0;
			box-shadow: 0 0 3px 0.5px #d90000;
		}
		.forgot-password-dialog-button {
			display: block;
			cursor: pointer;
			width: fit-content;
			white-space: nowrap;
			margin-top: 12px;
			border-radius: 5px;
			font-size: 15px;
			font-weight: bold;
			color: #fff;
			border: 0px;
			padding: 9px 12px 7px 12px;
			background-color: var(--dark-blue);
		}
		.forgot-password-dialog-button:hover {
			background-color: #1c1c1c;
		}
		.forgot-password-dialog-button:focus {
			outline: 0;
		}
		.forgot-password-dialog-error {
			display: none;
			color: #d90000;
			font-size: 13px;
			padding: 0px 12px;
			margin-top: 3px;
			margin-bottom: 18px;
		}
		.forgot-password-dialog-email-sent {
			display: none;
			background-color: #90ee90;
			border-radius: 5px;
			color: #1c1c1c;
			padding: 12px;
			font-size: 18px;
			font-weight: bold;
			margin-top: 18px;
		}
		.forgot-password-dialog-email-sent svg {
			height: 21px;
			vertical-align: bottom;
		}
		.forgot-password-dialog-progress {
			display: none;
			width: 48px;
			height: 48px;
			margin-top: 15px;
			animation: rotate 0.4s linear infinite;
		}
		.USER_INPUT_pass-reset-link-expired {
			background-color: #d90000;
			width: calc(100% - 72px);
			text-align: left;
			padding: 15px 18px 18px 18px;
			color: #fff;
			border-radius: 5px;
			margin-bottom: 15px;
		}
		.USER_INPUT_pass-reset-link-expired svg {
			fill: #fff;
			height: 24px;
			vertical-align: text-bottom;
		}
		@keyframes rotate {
			0% {
				transform: rotate(0deg);
			}
			100% {
				transform: rotate(360deg);
			}
		}
		@media only screen and (max-width: 1185px) {
			.header-graphic {
				left: -240px;
			}
		}
		@media only screen and (max-width: 1000px) {
			.header-graphic {
				left: -300px;
			}
		}
		@media only screen and (max-width: 768px) {
			.header-graphic {
				left: -240px;
			}
			.user-login, .user-signup {
				display: block;
				border: 0px;
			}
		}
		@media only screen and (max-width: 700px) {
			.header-graphic {
				left: -300px;
			}
			.user-login, .user-signup {
				display: block;
				width: 75%;
			}
		}
		@media only screen and (max-width: 500px) {
			.logo svg {
				height: 45px;
			}
			.header-graphic {
				left: -300px;
			}
			.action-table-heading {
				font-size: 21px;
			}
			.user-login, .user-signup {
				display: block;
				width: 90%;
			}
			.forgot-password-dialog {
				width: calc(100vw - 72px);
			}
		}
		</style>

		<script type="text/javascript">
		const App = {
			errorBox: {},
			errorIn: {
				loginEmail: false,
				loginPassword: false,
				signupEmail: false,
				signupPassword: false,
				signupVerifyPassword: false
			},
			firstError: {
				loginEmail: false,
				loginPassword: false,
				signupEmail: false,
				signupPassword: false,
				signupVerifyPassword: false
			},
			passwordVisibility: [false, false, false],
			isFieldEmpty: {
				loginEmail: false,
				loginPassword: false,
				signupEmail: false,
				signupPassword: false,
				signupVerifyPassword: false
			},
			existingEmail: [],
			init: function() {
				let Input = document.getElementsByClassName('action-table-input');
				let Button = document.getElementsByClassName('action-table-button');
				let FormError = document.getElementsByClassName('form-error');

				// Screen Adjustment

				// Login Form
				this.loginEmail = Input[0];
				this.loginPassword = Input[1];
				this.loginSubmit = Button[0];

				// Signup Form
				this.signupEmail = Input[2];
				this.signupPassword = Input[3];
				this.signupVerifyPassword = Input[4];
				this.signupSubmit = Button[1];

				this.passwordDisplayToggle = document.getElementsByClassName('password-display-toggle');

				// Error Fields
				this.errorBox.loginEmail = FormError[0];
				this.errorBox.loginPassword = FormError[1];
				this.errorBox.signupEmail = FormError[2];
				this.errorBox.signupPassword = FormError[3];
				this.errorBox.signupVerifyPassword = FormError[4];

				this.forgotPasswordDialogContainer = document.getElementsByClassName('forgot-password-dialog-container')[0];
				this.forgotPasswordDialogError = document.getElementsByClassName('forgot-password-dialog-error')[0];
				this.forgotPasswordDialog = document.getElementsByClassName('forgot-password-dialog')[0];
				this.forgotPasswordButton = document.getElementsByClassName('forgot-password-dialog-button')[0];
				this.forgotPasswordEmail = document.getElementsByClassName('forgot-password-dialog-input')[0];
				this.forgotPassword = document.getElementsByClassName('forgot-password')[0];
				this.forgotPasswordForm = document.getElementsByClassName('forgot-password-dialog-form')[0];
				this.forgotPasswordProgress = document.getElementsByClassName('forgot-password-dialog-progress')[0];
				this.forgotPasswordSuccess = document.getElementsByClassName('forgot-password-dialog-email-sent')[0];

				this.somethingIsNotRight = document.getElementsByClassName('something-is-not-right')[0];
			},
			resetScreenFocus: function() {
				//console.log(window.innerWidth, window.innerHeight);
				if((window.innerWidth <= 768 && window.innerHeight < 780) || window.innerHeight < 591) {
					// Unlock from the center
					this.mainScreen.style.position = 'relative';
					this.mainScreen.style.left = '0px';
					this.mainScreen.style.transform = 'translate(0, 0)';
				} else {
					// Lock to the centre
					this.mainScreen.style.position = 'absolute';
					this.mainScreen.style.left = '50%';
					this.mainScreen.style.transform = 'translate(-50%, calc(-50% - 60px))';
				}
			},
			sendRequest: function(opCode, data) {
				console.log('This is page has been reproduced just for showcasing.');
			},
			enableForms: function() {
				this.loginSubmit.innerHTML = 'Login';
				this.signupSubmit.innerHTML = 'Signup';
								
				let Input = document.getElementsByClassName('action-table-input');
				let Button = document.getElementsByClassName('action-table-button');

				for(let i = 0; i < Input.length; i ++) {
					Input[i].removeAttribute('disabled');
				}
				for(let i = 0; i < Button.length; i ++) {
					Button[i].removeAttribute('disabled');
				}
			},
			handleError: function(node, errorNode, messageCode, isValid) {
				const message = [
					'Cannot be empty!',
					'Invalid email address',
					'Password length should be greater than or equal to 8',
					'Passwords do not match',
					'Email address already in use',
					'Email address not found',
					'Incorrect Password'
				];
				if(!isValid) {
					node.className = 'action-table-input invalid-input';
					errorNode.innerHTML = message[messageCode];
					errorNode.style.display = 'block';
				} else {
					node.className = 'action-table-input valid-input';
					errorNode.innerHTML = '';
					errorNode.style.display = 'none';
				}
			},
			validateEmail: function(node) {
				let regex = /^(([^<>()\[\]\.,;:\s@\"]+(\.[^<>()\[\]\.,;:\s@\"]+)*)|(\".+\"))@(([^<>()[\]\.,;:\s@\"]+\.)+[^<>[\]\.,;:\s\"~`!@#$%^&*()+=\\\/]{2,})/;
				let isValid = false;
				if(regex.test(node.value)) {
					let match = node.value.match(regex);
					if(match[0].length === node.value.length) {
						isValid = true;
					}
				}
				return isValid;
			},
			defineError: function(node, element, errCode, isValid) {
				if(!isValid) {
					this.errorIn[node] = true;
					this.firstError[node] = true;
				} else {
					this.errorIn[node] = false;
				}
				this.handleError(element, this.errorBox[node], errCode, isValid);
			},
			limitPasswordLength: function(element) {
				if(element.value.length >= 128) {
					element.value = element.value.substr(0, 128);
				}
			},
			checkIfEmailExists: function(node, element, errCode) {
				if(!this.errorIn[node]) {
						
					let emailExists = false;

					for(let i = 0; i < this.existingEmail.length; i ++) {
						if(element.value == this.existingEmail[i]) {
							emailExists = true;
							this.errorIn[node] = true;
							this.handleError(element, this.errorBox[node], errCode, false);
							break;
						}
					}

					if(!emailExists) {
						this.errorIn[node] = false;
						this.handleError(element, this.errorBox[node], 4, true);
					}
				}
			},
			handleChange: function(change) {

				let isValid = false;

				switch(change) {
					
					// Login Form

					case 'login-email':
						isValid = this.validateEmail(this.loginEmail);
						this.defineError('loginEmail', this.loginEmail, 1, isValid);
						break;

					case 'login-password':
						//
						break;

					// Signup Form

					case 'signup-email':
						isValid = this.validateEmail(this.signupEmail);
						this.defineError('signupEmail', this.signupEmail, 1, isValid);
						this.checkIfEmailExists('signupEmail', this.signupEmail, 4);
						break;

					case 'signup-password':
						this.limitPasswordLength(this.signupPassword);
						if(this.signupPassword.value.length >= 8) {
							isValid = true;
						}
						this.defineError('signupPassword', this.signupPassword, 2, isValid);
						break;

					case 'signup-verify-password':
						this.limitPasswordLength(this.signupVerifyPassword);
						if(this.signupPassword.value === this.signupVerifyPassword.value) {
							isValid = true;
						}
						this.defineError('signupVerifyPassword', this.signupVerifyPassword, 3, isValid);
						break;

					default:
						break;
				}
			},
			handleInput: function(input) {

				let isValid = false;

				switch(input) {
					
					// Login Form

					case 'login-email':
						if(this.isFieldEmpty.loginEmail) {
							if(this.loginEmail.value.length > 0) {
								isValid = true;
								this.isFieldEmpty.loginEmail = false;
							} else {
								isValid = false;
								this.isFieldEmpty.loginEmail = true;
							}
							this.handleError(this.loginEmail, this.errorBox.loginEmail, 0, isValid);
						}
						if(this.firstError.loginEmail) {
							isValid = this.validateEmail(this.loginEmail);
							if(!isValid) {
								this.errorIn.loginEmail = true;
							} else {
								this.errorIn.loginEmail = false;
							}
							this.handleError(this.loginEmail, this.errorBox.loginEmail, 1, isValid);
						}
						break;

					case 'login-password':
						if(this.isFieldEmpty.loginPassword) {
							if(this.loginPassword.value.length > 0) {
								isValid = true;
								this.isFieldEmpty.loginPassword = false;
							} else {
								isValid = false;
								this.isFieldEmpty.loginPassword = true;
							}
							this.handleError(this.loginPassword, this.errorBox.loginPassword, 0, isValid);
						}
						if(this.errorIn.loginPassword) {
							isValid = true;
							this.errorIn.loginPassword = false;
							this.handleError(this.loginPassword, this.errorBox.loginPassword, 6, isValid);
						}
						break;

					// Signup Form

					case 'signup-email':
						if(this.isFieldEmpty.signupEmail) {
							if(this.signupEmail.value.length > 0) {
								isValid = true;
								this.isFieldEmpty.signupEmail = false;
							} else {
								isValid = false;
								this.isFieldEmpty.signupEmail = true;
							}
							this.handleError(this.signupEmail, this.errorBox.signupEmail, 0, isValid);
						}
						if(this.firstError.signupEmail) {
							isValid = this.validateEmail(this.signupEmail);
							if(!isValid) {
								this.errorIn.signupEmail = true;
							} else {
								this.errorIn.signupEmail = false;
							}
							this.handleError(this.signupEmail, this.errorBox.signupEmail, 1, isValid);
						}
						if(!this.errorIn.signupEmail) {
						
							let emailExists = false;

							for(let i = 0; i < this.existingEmail.length; i ++) {
								if(this.signupEmail.value == this.existingEmail[i]) {
									emailExists = true;
									this.errorIn.signupEmail = true;
									this.handleError(this.signupEmail, this.errorBox.signupEmail, 4, false);
									break;
								}
							}

							if(!emailExists) {
								this.errorIn.signupEmail = false;
								this.handleError(this.signupEmail, this.errorBox.signupEmail, 4, true);
							}
						}
						break;

					case 'signup-password':
						if(this.isFieldEmpty.signupPassword) {
							if(this.signupPassword.value.length > 0) {
								isValid = true;
								this.isFieldEmpty.signupPassword = false;
							} else {
								isValid = false;
								this.isFieldEmpty.signupPassword = true;
							}
							this.handleError(this.signupPassword, this.errorBox.signupPassword, 0, isValid);
						}
						if(this.firstError.signupPassword) {
							if(this.signupPassword.value.length >= 8) {
								isValid = true;
								this.errorIn.signupPassword = false;
							} else {
								this.errorIn.signupPassword = true;
							}
							this.handleError(this.signupPassword, this.errorBox.signupPassword, 2, isValid);
						}
						if(this.signupVerifyPassword.value.length != 0) {
							if(this.signupVerifyPassword.value != this.signupPassword.value) {
								isValid = false;
								this.errorIn.signupVerifyPassword = true;
								this.firstError.signupVerifyPassword = true;
							} else {
								isValid = true;
								this.errorIn.signupVerifyPassword = false;
							}
							this.handleError(this.signupVerifyPassword, this.errorBox.signupVerifyPassword, 3, isValid);
						}
						break;

					case 'signup-verify-password':
						if(this.isFieldEmpty.signupVerifyPassword) {
							if(this.signupVerifyPassword.value.length > 0) {
								isValid = true;
								this.isFieldEmpty.signupVerifyPassword = false;
							} else {
								isValid = false;
								this.isFieldEmpty.signupVerifyPassword = true;
							}
							this.handleError(this.signupVerifyPassword, this.errorBox.signupVerifyPassword, 0, isValid);
						}
						if(this.firstError.signupVerifyPassword) {
							if(this.signupPassword.value === this.signupVerifyPassword.value) {
								isValid = true;
								this.errorIn.signupVerifyPassword = false;
							} else {
								this.errorIn.signupVerifyPassword = true;
							}
							this.handleError(this.signupVerifyPassword, this.errorBox.signupVerifyPassword, 3, isValid);
						}
						break;

					default:
						break;
				}
			},
			handleClick: function(click) {

				let isValid = true;

				switch(click) {
					
					case 'login':
						if(this.loginEmail.value === '') {
							isValid = false;
							this.isFieldEmpty.loginEmail = true;
							this.handleError(this.loginEmail, this.errorBox.loginEmail, 0, isValid);
						}
						if(this.loginPassword.value === '') {
							isValid = false;
							this.isFieldEmpty.loginPassword = true;
							this.handleError(this.loginPassword, this.errorBox.loginPassword, 0, isValid);
						}

						if(isValid) {
							if(!this.errorIn.loginEmail && !this.errorIn.loginPassword) {
								this.loginSubmit.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12,4V2A10,10 0 0,0 2,12H4A8,8 0 0,1 12,4Z" /></svg>';
								
								let Input = document.getElementsByClassName('action-table-input');
								let Button = document.getElementsByClassName('action-table-button');

								for(let i = 0; i < Input.length; i ++) {
									Input[i].setAttribute('disabled', '');
								}
								for(let i = 0; i < Button.length; i ++) {
									Button[i].setAttribute('disabled', '');
								}

								let data = 'email=' + this.loginEmail.value + '&password=' + this.loginPassword.value + '&unique=produced-as-a-sample';
								this.sendRequest(1, data);
							}
						}
						break;

					case 'signup':
						// Recheck Signup Email
						isValid = this.validateEmail(this.signupEmail);
						this.defineError('signupEmail', this.signupEmail, 1, isValid);
						this.checkIfEmailExists('signupEmail', this.signupEmail, 4);

						// Recheck Signup Password
						this.limitPasswordLength(this.signupPassword);
						if(this.signupPassword.value.length < 8) {
							isValid = false;
						}
						this.defineError('signupPassword', this.signupPassword, 2, isValid);

						// Recheck Signup Repeated Password
						this.limitPasswordLength(this.signupVerifyPassword);
						if(this.signupPassword.value != this.signupVerifyPassword.value) {
							isValid = false;
						}
						this.defineError('signupVerifyPassword', this.signupVerifyPassword, 3, isValid);

						if(this.signupEmail.value === '') {
							isValid = false;
							this.isFieldEmpty.signupEmail = true;
							this.handleError(this.signupEmail, this.errorBox.signupEmail, 0, isValid);
						}
						if(this.signupPassword.value === '') {
							isValid = false;
							this.isFieldEmpty.signupPassword = true;
							this.handleError(this.signupPassword, this.errorBox.signupPassword, 0, isValid);
						}
						if(this.signupVerifyPassword.value === '') {
							isValid = false;
							this.isFieldEmpty.signupVerifyPassword = true;
							this.handleError(this.signupVerifyPassword, this.errorBox.signupVerifyPassword, 0, isValid);
						}

						if(isValid) {
							if(!this.errorIn.signupEmail && !this.errorIn.signupPassword && !this.errorIn.signupVerifyPassword) {
								this.signupSubmit.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12,4V2A10,10 0 0,0 2,12H4A8,8 0 0,1 12,4Z" /></svg>';
								
								let Input = document.getElementsByClassName('action-table-input');
								let Button = document.getElementsByClassName('action-table-button');

								for(let i = 0; i < Input.length; i ++) {
									Input[i].setAttribute('disabled', '');
								}
								for(let i = 0; i < Button.length; i ++) {
									Button[i].setAttribute('disabled', '');
								}

								let data = 'email=' + this.signupEmail.value + '&password=' + this.signupPassword.value + '&unique=produced-as-a-sample';
								this.sendRequest(0, data);
							}
						}
					
						break;

					default:
						break;
				}
			},
			togglePasswordVisibility: function(n) {
				this.passwordVisibility[n] = !this.passwordVisibility[n];
				if(this.passwordVisibility[n]) {
					this.passwordDisplayToggle[n].getElementsByClassName('unhide-password')[0].style.display = 'none';
					this.passwordDisplayToggle[n].getElementsByClassName('hide-password')[0].style.display = 'block';
					this.passwordDisplayToggle[n].parentElement.getElementsByClassName('action-table-input')[0].setAttribute('type', 'text');
				} else {
					this.passwordDisplayToggle[n].getElementsByClassName('unhide-password')[0].style.display = 'block';
					this.passwordDisplayToggle[n].getElementsByClassName('hide-password')[0].style.display = 'none';
					this.passwordDisplayToggle[n].parentElement.getElementsByClassName('action-table-input')[0].setAttribute('type', 'password');
				}
			},
			popForgotPasswordDialog: function() {
				this.forgotPasswordDialogContainer.style.display = 'block';
				this.forgotPasswordDialog.style.display = 'block';
				this.forgotPasswordEmail.focus();
			},
			sendPasswordResetLink: function() {

				let isEmailValid = false;

				if(this.forgotPasswordEmail.value != '') {

					isEmailValid = this.validateEmail(this.forgotPasswordEmail);

					if(isEmailValid) {
						this.forgotPasswordEmailError(-1);
					} else {
						this.forgotPasswordEmailError(2);
					}
				} else {
					this.forgotPasswordEmailError(1);
				}

				if(isEmailValid) {
					this.forgotPasswordForm.style.display = 'none';
					this.forgotPasswordProgress.style.display = 'block';

					let data = 'email=' + this.forgotPasswordEmail.value + '&unique=produced-as-a-sample';
					this.sendRequest(2, data);
				}
			},
			forgotPasswordEmailError: function(code) {

				if(code === -1) {

					this.forgotPasswordEmail.className = 'forgot-password-dialog-input forgot-password-dialog-input-valid';
					this.forgotPasswordDialogError.style.display = 'none';

				} else {

					const errorMessages = ['Cannot be empty!', 'Invalid email address', 'Email address does not exist'];

					this.forgotPasswordEmail.className = 'forgot-password-dialog-input forgot-password-dialog-input-invalid';
					this.forgotPasswordDialogError.style.display = 'block';
					this.forgotPasswordDialogError.innerHTML = errorMessages[code - 1];
				}
			},
			listen: function() {
				// Login Form
				this.loginEmail.addEventListener('input', () => { this.handleInput('login-email'); });
				this.loginEmail.addEventListener('change', () => { this.handleChange('login-email'); });
				this.loginPassword.addEventListener('input', () => { this.handleInput('login-password'); });
				this.loginPassword.addEventListener('change', () => { this.handleChange('login-password'); });
				this.loginSubmit.addEventListener('click', () => { this.handleClick('login'); });

				// Signup Form
				this.signupEmail.addEventListener('input', () => { this.handleInput('signup-email'); });
				this.signupEmail.addEventListener('change', () => { this.handleChange('signup-email'); });
				this.signupPassword.addEventListener('input', () => { this.handleInput('signup-password'); });
				this.signupPassword.addEventListener('change', () => { this.handleChange('signup-password'); });
				this.signupVerifyPassword.addEventListener('input', () => { this.handleInput('signup-verify-password'); });
				this.signupVerifyPassword.addEventListener('change', () => { this.handleChange('signup-verify-password'); });
				this.signupSubmit.addEventListener('click', () => { this.handleClick('signup'); });

				// Error Focus / Blur
				// 0 0.5px 3px 0.5px #d90000;
				let boxShadow = '0 0.5px 3px 0.5px #d90000';
				this.loginEmail.addEventListener('focus', () => { this.errorBox.loginEmail.style.boxShadow = boxShadow; });
				this.loginPassword.addEventListener('focus', () => { this.errorBox.loginPassword.style.boxShadow = boxShadow; });
				this.signupEmail.addEventListener('focus', () => { this.errorBox.signupEmail.style.boxShadow = boxShadow; });
				this.signupPassword.addEventListener('focus', () => { this.errorBox.signupPassword.style.boxShadow = boxShadow; });
				this.signupVerifyPassword.addEventListener('focus', () => { this.errorBox.signupVerifyPassword.style.boxShadow = boxShadow; });
				this.loginEmail.addEventListener('blur', () => { this.errorBox.loginEmail.style.boxShadow = ''; });
				this.loginPassword.addEventListener('blur', () => { this.errorBox.loginPassword.style.boxShadow = ''; });
				this.signupEmail.addEventListener('blur', () => { this.errorBox.signupEmail.style.boxShadow = ''; });
				this.signupPassword.addEventListener('blur', () => { this.errorBox.signupPassword.style.boxShadow = ''; });
				this.signupVerifyPassword.addEventListener('blur', () => { this.errorBox.signupVerifyPassword.style.boxShadow = ''; });
				
				// Enter key press
				this.loginEmail.addEventListener('keypress', (e) => { if(e.which == 13) { this.handleClick('login'); }});
				this.loginPassword.addEventListener('keypress', (e) => { if(e.which == 13) { this.handleClick('login'); }});
				this.signupEmail.addEventListener('keypress', (e) => { if(e.which == 13) { this.handleClick('signup'); }});
				this.signupPassword.addEventListener('keypress', (e) => { if(e.which == 13) { this.handleClick('signup'); }});
				this.signupVerifyPassword.addEventListener('keypress', (e) => { if(e.which == 13) { this.handleClick('signup'); }});

				this.forgotPassword.addEventListener('click', () => { this.popForgotPasswordDialog(); });
				this.forgotPasswordEmail.addEventListener('input', () => { this.forgotPasswordEmailError(-1); });
				this.forgotPasswordButton.addEventListener('click', () => { this.sendPasswordResetLink(); });
				this.forgotPasswordEmail.addEventListener('keypress', (e) => { if(e.which === 13) { this.sendPasswordResetLink(); } });

				for(let i = 0; i < this.passwordDisplayToggle.length; i ++) {
					this.passwordDisplayToggle[i].addEventListener('click', () => { this.togglePasswordVisibility(i); });
				}
				
				window.onresize = () => {
					this.resetScreenFocus();
				};

				window.onload = () => {
					this.resetScreenFocus();
				};
			}
		};
		App.init();
		App.listen();
		</script>
	</body>
</html>
