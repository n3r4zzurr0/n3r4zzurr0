<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css?family=Luckiest+Guy&display=swap" rel="stylesheet">

<style type="text/css">
body{
	font-family: 'Luckiest Guy', cursive;
	margin: 0;
	padding: 0;
	background-image: url("img/bg.png");
	background-repeat: no-repeat;
	background-size: 100% 100%;
}
#startScreen{
	padding: 12;
}
.startBtn{
	user-select: none;
	font-family: 'Luckiest Guy', cursive;
	font-size: 36;
	border: 0;
	background-color: #000;
	color: #fff;
	cursor: pointer;
	padding: 12;
	border-radius: 6px;
}
.startBtn:hover{
	background-color: #eee;
	color: #000;
}
.gameTitle{
	user-select: none;
	font-family: 'Luckiest Guy', cursive;
	font-size: 60;
}
#gameInstructions{
	user-select: none;
	font-size: 24;
	padding: 6;
}
.key{
	color: #fff;
	background-color: #000;
	border-radius: 3px;
	padding: 0 9 0 9;
}
#score{
	user-select: none;
	position: fixed;
	top: 0;
	right: 0;
	padding: 12;
	font-size: 36;
}
#finalScore{
	user-select: none;
	font-size: 45;
}
</style>
<body>
	<div id="startScreen"><center>
		<div style="margin-top:60px;"></div>
		<div class="gameTitle">City Run</div>
		<br>
		<div id="gameInstructions">
			Jump over the green boxed guy<br>
			Kill the red one<br><br>
			Press <span class="key">j</span> to jump and <span class="key">f</span> to fire
		</div>
		<div id="finalScore"></div>
		<br>
		<button class="startBtn" onclick="startGame();">Play Now</button>
	</center></div>

	<div id="score"></div>

	<canvas id="game" style="display:none;"></canvas>
</body>

<script type="text/javascript">
const hexToRgb = hex => hex.replace(/^#?([a-f\d])([a-f\d])([a-f\d])$/i ,(m, r, g, b) => '#' + r + r + g + g + b + b).substring(1).match(/.{2}/g).map(x => parseInt(x, 16));

const local = {
	config : {
		y : 150,
		health : 3,
		headHeight : 36,
		headMarginX : -4,
		headMarginY : 5,
		bodyWidth : 58,
		bodyHeight : 56,
		bodyWidthWhileFiring : 69,
		playerLeftIndent : 24,
		bulletStartPosition : 84,
		gapWidth : 120,
		gunWidth : 20,
		gunHeight : 20,
		entityWidth : 56,
		entityHeight : 62,
		bulletWidth : 10,
		bulletHeight : 4,
		powWidth : 60,
		powHeight : 60,
		powMarginX : -24,
		powMarginY : -84,
	},
	color : {
		bullet : "#ff0000",
		enemyLaser : "#ff0000"
	},
	img : {
		gun : "img/gun.png",
		pow : "img/pow.png",
		head : "img/head.png",
		enemy : "img/enemy.png",
		friend : "img/friend.png",
		sprite : "img/sprite.png",
		spriteFire : "img/spriteFire.png",
		background : "img/bg.png",
		health : "img/health.png"
	},
	audio : {
		die : "audio/die.wav",
		fall : "audio/fall.wav",
		fire : "audio/fire.wav",
		music : "audio/music.mp3",
		collision : "audio/collision.wav"
	}
};

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameOver = 0;
let frame = 0;

let shotFired = 0;
let jumpTriggered = 0;

var score = 0;
var bg_frame = 0;

let bg = new Image();
bg.src = local.img.background;

let head_ = new Image();
head_.src = local.img.head;

let stickman = new Image();
stickman.src = local.img.sprite;

let stickmanFire = new Image();
stickmanFire.src = local.img.spriteFire;

let gun_ = new Image();
gun_.src = local.img.gun;

let enemy_ = new Image();
enemy_.src = local.img.enemy;

let friend_ = new Image();
friend_.src = local.img.friend;

let pow = new Image();
pow.src = local.img.pow;

let health = new Image();
health.src = local.img.health;

let fallSound = new Audio();
fallSound.src = local.audio.fall;

let fireSound = new Audio();
fireSound.src = local.audio.fire;

let collisionSound = new Audio();
collisionSound.src = local.audio.collision;

let dieSound = new Audio();
dieSound.src = local.audio.die;

let music = new Audio();
music.src = local.audio.music;

let bullets = [];
let enemies = [];
let friends = [];
let gaps = [];

/* ---------- TRACKER ------------- */
function tracker(ctx, x, y){
	ctx.fillStyle = "#c82124";
	ctx.beginPath();
	ctx.arc(x, y, 3, 0, 2 * Math.PI);
	ctx.closePath();
	ctx.fill();
}
/* -------------------------------- */

const head = {
	animate : [0, 2, 1, 1],
	w : (head_.width / head_.height) * local.config.headHeight,
	h : local.config.headHeight,
	fall_y : 0,
	draw : function(){
		if(player.blink == 1){
			if(frame % 2 == 0){
				ctx.drawImage(head_, 0, 0, head_.width, head_.height, player.x + local.config.bodyWidth / 2 + local.config.headMarginX, canvas.height - local.config.y - player.h - this.h - player.jump_y + local.config.headMarginY + this.animate[player.f], this.w, this.h);
			}
		}else{
			ctx.drawImage(head_, 0, 0, head_.width, head_.height, player.x + local.config.bodyWidth / 2 + local.config.headMarginX, canvas.height - local.config.y - player.h - this.h - player.jump_y + local.config.headMarginY + this.animate[player.f], this.w, this.h);
		}
	},
	fall : function(){
		if(player.collision == 1){
			//this.fall_x -= 5; // TO DETACH THE HEAD
			if(player.fall_f < 5)
				this.fall_y -= 5;
			else if(player.fall_f >=5 && player.fall_f < 10)
				this.fall_y += 0;
			else if(player.fall_f >=10 && player.fall_f < 16)
				this.fall_y += 7;
			else
				this.fall_y += 15;
		}else
			this.fall_y += 15;

		ctx.drawImage(head_, 0, 0, head_.width, head_.height, player.x + local.config.bodyWidth / 2 - local.config.headMarginX + this.fall_x, canvas.height - local.config.y - player.h - this.h - player.jump_y + local.config.headMarginY + this.animate[player.f] + this.fall_y, this.w, this.h);
	}
}

const player = {
	animate : [
		{x : 0, y : 0, w : 58, h : 56},
		{x : 58, y : 0, w : 58, h : 56},
		{x : 116, y : 0, w : 58, h : 56},
		{x : 174, y : 0, w : 58, h : 56}
	],
	animateF : [
		{x : 0, y : 0, w : 69, h : 56},
		{x : 69, y : 0, w : 69, h : 56},
		{x : 138, y : 0, w : 69, h : 56},
		{x : 207, y : 0, w : 69, h : 56}
	],
	fallSafeDistance : [26, 27, 11, 32],
	x : local.config.playerLeftIndent,
	y : local.config.y,
	w : local.config.bodyWidth,
	h : local.config.bodyHeight,
	f : 0,
	d : 10,
	jump_f : 0,
	jump_y : 0,
	blink : 0,
	blink_f : 0,
	fall_ : 0,
	fall_f : 0,
	collision : 0,
	run : function(){
		let sprite, player;
		if(shotFired == 1){
			sprite = stickmanFire;
			player = this.animateF[this.f];
			this.w = local.config.bodyWidthWhileFiring;
		}else{
			sprite = stickman;
			player = this.animate[this.f];
			this.w = local.config.bodyWidth;
		}
		if(this.blink == 1){
			if(frame % 2 == 0)
				ctx.drawImage(sprite, player.x, player.y, player.w, player.h, this.x, canvas.height - this.y - this.h - this.jump_y, this.w, this.h);
			this.blink_f ++;
			if(this.blink_f > 45){
				this.blink_f = 0;
				this.blink = 0;
			}
		}else{
			ctx.drawImage(sprite, player.x, player.y, player.w, player.h , this.x, canvas.height - this.y - this.h - this.jump_y, this.w, this.h);
		}
		//tracker(ctx, this.x + 9, canvas.height - this.y - this.jump_y);
		//tracker(ctx, this.x + this.w - 12, canvas.height - this.y - this.jump_y);
		if(frame % this.d == 0)
			this.f ++;
		// Reset Player Frame
		if(this.f == 4)
			this.f = 0;
	},
	jump : function(){
		this.f = 2;
		gun.f = 2;
		if(this.jump_f < 40)
			if(this.jump_f < 20)
				if(this.jump_f < 10)
					this.jump_y += 9;
				else if(this.jump_f >= 10 && this. jump_f < 16)
					this.jump_y += 5;
				else
					this.jump_y += 1;
			else
				if(this.jump_f < 24)
					this.jump_y -= 1;
				else if(this.jump_f >= 24 && this. jump_f < 30)
					this.jump_y -= 5;
				else
					this.jump_y -= 9;
		else{
			jumpTriggered = 0;
			this.jump_f = 0;
			this.jump_y = 0;
		}
	},
	fall : function(){
		if(this.collision == 1){
			this.x -= 5;
			if(this.fall_f < 5)
				this.y += 5;
			else if(this.fall_f >=5 && this.fall_f < 10)
				this.y -= 0;
			else
				this.y -= 15;
		}else
			this.y -= 15;

		let sprite, player;
		if(shotFired == 1){
			sprite = stickmanFire;
			player = this.animateF[this.f];
			this.w = local.config.bodyWidthWhileFiring;
		}else{
			sprite = stickman;
			player = this.animate[this.f];
			this.w = local.config.bodyWidth;
		}
		ctx.drawImage(sprite, player.x, player.y, player.w, player.h , this.x, canvas.height - this.y - this.h - this.jump_y, this.w, this.h);
		this.fall_f ++;
		if(this.fall_f > 20)
			gameOver = 1;
	}
}

const gun = {
	animate : [
		{x : 83, y : local.config.y + player.h - 5, a : -33},
		{x : 70, y : local.config.y + player.h - 23, a : 18},
		{x : 39, y : local.config.y + player.h - 15, a : 160},
		{x : 56, y : local.config.y + player.h - 26, a : 65}
	],
	animateF : [
		{x : 90, y : local.config.y + player.h - 6, a : 0},
		{x : 89, y : local.config.y + player.h - 7, a : 0},
		{x : 90, y : local.config.y + player.h - 7, a : 0},
		{x : 88, y : local.config.y + player.h - 7, a : 0}
	],
	f : 0,
	d : 10,
	shot_f : 0,
	fall_x : 0,
	fall_y : 0,
	draw : function(){
		let gun;
		if(shotFired == 1){
			gun = this.animateF[this.f];
			this.shot_f ++;
			if(this.shot_f == 10){
				this.shot_f = 0;
				shotFired = 0;
			}
		}else{
			gun = this.animate[this.f];
		}
		ctx.save();
		if(player.blink == 1){
			if(frame % 2 == 0){
				ctx.translate(gun.x, canvas.height - gun.y - player.jump_y);
				ctx.rotate(gun.a * Math.PI / 180);
				ctx.drawImage(gun_, -local.config.gunWidth / 2, -local.config.gunHeight / 2, local.config.gunWidth, local.config.gunHeight);
			}
		}else{
			ctx.translate(gun.x, canvas.height - gun.y - player.jump_y);
			ctx.rotate(gun.a * Math.PI / 180);
			ctx.drawImage(gun_, -local.config.gunWidth / 2, -local.config.gunHeight / 2, local.config.gunWidth, local.config.gunHeight);
		}
		ctx.restore();
		if(frame % this.d == 0)
			this.f ++;
		// Reset Gun Frame
		if(this.f == 4)
			this.f = 0;
	},
	fire : function(){
		fireSound.volume = 0.25;
		fireSound.currentTime = 0;
		fireSound.play();
		shotFired = 1;
		let x = local.config.bulletStartPosition;
		let y = canvas.height - local.config.y - player.h - player.jump_y;
		bullets.push({
			entity : new bullet(),
			pos : {
				x : x,
				y : y
			}
		});
	},
	fall : function(){
		let gun;
		if(shotFired == 1){
			gun = this.animateF[this.f];
		}else{
			gun = this.animate[this.f];
		}
		if(player.collision == 1){
			if(player.fall_f < 5)
				this.fall_y -= 5;
			else if(player.fall_f >=5 && player.fall_f < 10)
				this.fall_y += 0;
			else if(player.fall_f >=10 && player.fall_f < 16)
				this.fall_y += 7;
			else
				this.fall_y += 15;
		}else
			this.fall_y += 15;
		
		ctx.save();
		ctx.translate(gun.x, canvas.height - gun.y - player.jump_y + this.fall_y);
		ctx.rotate(gun.a * Math.PI / 180);
		ctx.drawImage(gun_, -local.config.gunWidth / 2, -local.config.gunHeight / 2, local.config.gunWidth, local.config.gunHeight);
		ctx.restore();
	}
}

class enemy{
	constructor(x, y){
		this.draw(x, y);
	}
	draw(x, y){
		let w = local.config.entityWidth;
		let h = local.config.entityHeight;
		let color = hexToRgb(local.color.enemyLaser);
		ctx.fillStyle = "rgba("+color[0]+", "+color[1]+", "+color[2]+", 0.4)";
		ctx.fillRect(x, 0, w, canvas.height - local.config.y);
		ctx.drawImage(enemy_, 0, 0, enemy_.width, enemy_.height, x, canvas.height - h - y, w, h);

	}
	move(i){
		let w = local.config.entityWidth;
		let h = local.config.entityHeight;
		if(enemies[i].status == 1){
			enemies[i].pos.x -= 5;
			this.draw(enemies[i].pos.x, enemies[i].pos.y);
		}else{
			enemies[i].pos.y -= 10;
			enemies[i].angle += 20;
			ctx.save();
			ctx.translate(enemies[i].pos.x, canvas.height - enemies[i].pos.y - h);
			ctx.rotate(enemies[i].angle * Math.PI / 180);
			ctx.drawImage(enemy_, -w / 2, -h / 2, w, h);
			ctx.restore();
			if(enemies[i].killFrame < 4)
				ctx.drawImage(pow, 0, 0, pow.width, pow.height, enemies[i].powx + local.config.powMarginX, canvas.height - enemies[i].powy + local.config.powMarginY, local.config.powWidth, local.config.powHeight);
			enemies[i].killFrame ++;
		}

	}
	kill(i){
		enemies.splice(i, 1);
	}
}

class friend{
	constructor(x, y){
		this.draw(x, y);
	}
	draw(x, y){
		let w = local.config.entityWidth;
		let h = local.config.entityHeight;
		ctx.drawImage(friend_, 0, 0, friend_.width, friend_.height, x, canvas.height - h - y, w, h);
	}
	move(i){
		if(friends[i].status == 1){
			friends[i].pos.x -= 5;
			this.draw(friends[i].pos.x, friends[i].pos.y);
		}else{
			let w = local.config.entityWidth;
			let h = local.config.entityHeight;
			friends[i].pos.y -= 10;
			friends[i].angle += 20;
			ctx.save();
			ctx.translate(friends[i].pos.x, canvas.height - friends[i].pos.y - h);
			ctx.rotate(friends[i].angle * Math.PI / 180);
			ctx.drawImage(friend_, -w / 2, -h / 2, w, h);
			ctx.restore();
			//this.draw(enemies[i].pos.x, enemies[i].pos.y);
			if(friends[i].killFrame < 4)
				ctx.drawImage(pow, 0, 0, pow.width, pow.height, friends[i].powx + local.config.powMarginX, canvas.height - friends[i].powy + local.config.powMarginY, local.config.powWidth, local.config.powHeight);
			friends[i].killFrame ++;

			if(friends[i].killFrame > local.config.y / 10)
				gameOver = 1;
		}
	}
	kill(i, how){
		friends.splice(i, 1);
	}
}

class bullet{
	constructor(x, y){
		this.draw(x, y);
	}
	draw(x, y){
		ctx.fillStyle = local.color.bullet;
		ctx.fillRect(x, y, local.config.bulletWidth, local.config.bulletHeight);
	}
	travel(i){
		bullets[i].pos.x += 20;
		this.draw(bullets[i].pos.x, bullets[i].pos.y);
	}
	destroy(i){
		bullets.splice(i, 1);
	}
}

class gap{
	constructor(x){
		this.draw(x);
	}
	draw(x){
		if(x + local.config.gapWidth <= canvas.width - bg_frame){
			ctx.drawImage(bg, (x + bg_frame) * bg.width / canvas.width, bg.height - local.config.y * bg.height / canvas.height, local.config.gapWidth * bg.width / canvas.width, local.config.y * bg.height / canvas.height, x, canvas.height - local.config.y, local.config.gapWidth, local.config.y);
		}else if(x < canvas.width - bg_frame && x + local.config.gapWidth > canvas.width - bg_frame){
			ctx.drawImage(bg, (x + bg_frame) * bg.width / canvas.width, bg.height - local.config.y * bg.height / canvas.height, (canvas.width - bg_frame - x) * bg.width / canvas.width, local.config.y * bg.height / canvas.height, x, canvas.height - local.config.y, canvas.width - bg_frame - x, local.config.y);
			ctx.drawImage(bg, 0, bg.height - local.config.y * bg.height / canvas.height, (local.config.gapWidth - canvas.width + bg_frame + x) * bg.width / canvas.width, local.config.y * bg.height / canvas.height, canvas.width - bg_frame, canvas.height - local.config.y, local.config.gapWidth - canvas.width + bg_frame + x, local.config.y);
		}else{
			ctx.drawImage(bg, (x - (canvas.width - bg_frame)) * bg.width / canvas.width, bg.height - local.config.y * bg.height / canvas.height, local.config.gapWidth * bg.width / canvas.width, local.config.y * bg.height / canvas.height, x, canvas.height - local.config.y, local.config.gapWidth, local.config.y);
		}
	}
	move(i){
		gaps[i].pos.x -= 5;
		this.draw(gaps[i].pos.x);
	}
	destroy(i){
		gaps.splice(i, 1);
	}
}

function updateEntities(state){
	for(let i=0; i<enemies.length; i++)
		enemies[i].entity.move(i);

	for(let i=0; i<friends.length; i++)
		friends[i].entity.move(i);

	for(let i=0; i<bullets.length; i++)
		bullets[i].entity.travel(i);

	for(let i=0; i<gaps.length; i++)
		gaps[i].entity.move(i);
}

function getForemost(comparator){
	let foremost = {
		type : '',
		index : 0,
		object : {
			entity : '',
			pos : {
				x : canvas.width,
				y : -1
			}
		}
	};
	comparator = comparator == 'b' ? (local.config.bulletStartPosition - 56) : -62;
	for(var i=0; i<enemies.length; i++)
		if(enemies[i].status == 1)
			if(enemies[i].pos.x >= comparator){
				foremost = {
					index : i,
					type : 'e',
					object : enemies[i]
				};
				break;
			}

	for(var i=0; i<friends.length; i++)
		if(friends[i].pos.x < foremost.object.pos.x)
			if(friends[i].status == 1)
				if(friends[i].pos.x >= comparator){
					foremost = {
						index : i,
						type : 'f',
						object : friends[i]
					};
					break;
				}
	return foremost;
}

function checkIfPlayerCollides(){
	let foremost = getForemost('c');
	if(foremost.type == 'f'){
		if(foremost.object.pos.x + local.config.entityWidth / 2 > player.x + player.w / 2){
			if(foremost.object.pos.x < player.x + player.w - 12)
				if(player.jump_y < local.config.entityHeight)
					if(player.blink_f == 0)
						reduceHealth();
		}else{
			if(foremost.object.pos.x + local.config.entityWidth > player.x + 9)
				if(player.jump_y < local.config.entityHeight - 9)
					if(player.blink_f == 0)
						reduceHealth();
		}
	}
	if(foremost.type == 'e'){
		if(foremost.object.pos.x < player.x + player.w - 12)
			if(player.blink_f == 0)
				reduceHealth();
	}
}

function checkIfPlayerFalls(){
	if(gaps.length != 0)
		if(player.x + local.config.bodyWidth - player.fallSafeDistance[player.f] > gaps[0].pos.x && player.x + local.config.bodyWidth - 9 < gaps[0].pos.x + local.config.gapWidth)
			if(player.jump_y == 0){
				fallSound.play();
				player.fall_ = 1;
			}
}

function checkIfBulletKills(){
	let foremost = getForemost('b');
	let firstBullet;
	let firstBulletIndex;
	for(let i=0; i<bullets.length; i++)
		if(bullets[i].pos.y == canvas.height - player.h - local.config.y/* && bullets[i].pos.y <= 62*/){
			firstBullet = bullets[i];
			firstBulletIndex = i;
			break;
		}

	if(!firstBullet)
		if(bullets.length != 0){
			firstBullet = bullets[0];
			firstBulletIndex = 0;
		}

	if(bullets.length != 0){
		if(firstBullet.pos.y == canvas.height - player.h - local.config.y/* && firstBullet.pos.y >= canvas.height - local.config.y - 62*/){
			if(foremost.type == 'e'){
				if(enemies[foremost.index]){
					if(firstBullet.pos.x > enemies[foremost.index].pos.x){
						if(enemies[foremost.index].pos.y != -1){
							enemies[foremost.index].powx = enemies[foremost.index].pos.x;
							enemies[foremost.index].powy = enemies[foremost.index].pos.y;
							enemies[foremost.index].status = 0;
							score += 5;
							dieSound.playbackRate = 1;
							dieSound.currentTime = 0;
							dieSound.play();
						}
						firstBullet.entity.destroy(firstBulletIndex);
					}
				}
			}else{
				if(friends[foremost.index]){
					if(firstBullet.pos.x > friends[foremost.index].pos.x){
						if(friends[foremost.index].pos.y != -1){
							friends[foremost.index].powx = friends[foremost.index].pos.x;
							friends[foremost.index].powy = friends[foremost.index].pos.y;
							friends[foremost.index].status = 0;
							dieSound.playbackRate = 0.2;
							dieSound.currentTime = 0;
							dieSound.play();
						}
						firstBullet.entity.destroy(firstBulletIndex);
					}
				}
			}
		}
	}
}

function checkIfEnitiesCrossCanvasLimits(){
	for(let i=0; i<enemies.length; i++){
		if(enemies[i].pos.x < -local.config.entityWidth)
			enemies[i].entity.kill(i);
		if(enemies[i]){ /* Have to check in case the entity gets removed in the previous statement */
			if(enemies[i].pos.y < 0){
				enemies[i].entity.kill(i);
			}
		}
	}

	for(let i=0; i<friends.length; i++){
		if(friends[i].pos.x < -local.config.entityWidth || friends[i].pos.x > canvas.width + 1)
			friends[i].entity.kill(i, 'l');
		if(friends[i]){ /* Have to check in case the entity gets removed in the previous statement */
			if(friends[i].pos.y < 0){
				friends[i].entity.kill(i);
			}
		}
	}

	for(let i=0; i<bullets.length; i++)
		if(bullets[i].pos.x > canvas.width)
			bullets[i].entity.destroy(i);

	for(let i=0; i<gaps.length; i++)
		if(gaps[i].pos.x < -local.config.gapWidth)
			gaps[i].entity.destroy(i);
}

function drawHealth(){
	let y = 12;
	let x = 12;
	let a = 24;
	for(var i=0; i<local.config.health; i++){
		ctx.drawImage(health, 0, 0, health.width, health.height, x + i * a, y, 24, 24);
	}
}

function reduceHealth(){
	collisionSound.play();
	player.blink = 1;
	player.blink_f = 0;
	local.config.health --;
	if(local.config.health == 0){
		player.fall_ = 1;
		player.collision = 1;
	}
}

function startGame(){
	music.volume = 0.5;
	music.play();
	/* RESET GAME DATA */
	local.config.health = 3;
	frame = 0;
	score = 0;
	bg_frame = 0;
	gameOver = 0;
	jumpTriggered = 0;
	shotFired = 0;
	bullets = [];
	enemies = [];
	friends = [];
	gaps = [];

	head.fall_x = 0;
	head.fall_y = 0;

	/* RESET PLAYER DATA */
	player.x = local.config.playerLeftIndent;
	player.y = local.config.y;
	player.f = 0;
	player.fall_ = 0;
	player.fall_f = 0;
	player.jump_y = 0;
	player.jump_f = 0;
	player.blink = 0;
	player.blink_f = 0;
	player.collision = 0;

	/* RESET GUN DATA */
	gun.f = 0;
	gun.shot_f = 0;
	gun.fall_x = 0;
	gun.fall_y = 0;

	document.getElementById('startScreen').style.display = 'none';
	document.getElementById('game').style.display = '';
	loop();
}

function exitScreen(){
	music.pause();
	music.currentTime = 0;
	document.getElementById('startScreen').getElementsByTagName('button')[0].innerHTML = 'TRY AGAIN';
	document.getElementById('startScreen').style.display = '';
	document.getElementById('game').style.display = 'none';
	document.getElementById('score').innerHTML = '';
	document.getElementById('finalScore').innerHTML = score;
	document.getElementById('gameInstructions').innerHTML = 'FINAL SCORE';
}

function draw(){
	ctx.canvas.width = canvas.parentElement.clientWidth;
  	ctx.canvas.height = canvas.parentElement.clientHeight;

  	//alert(canvas.parentElement);

	ctx.fillStyle = "#ffffff";
	ctx.fillRect(0, 0, canvas.width, canvas.height);

	ctx.drawImage(bg, 0, 0, bg.width, bg.height, 0 - bg_frame, 0, canvas.width, canvas.height);
	ctx.drawImage(bg, 0, 0, bg.width, bg.height, canvas.width - bg_frame, 0, canvas.width, canvas.height);
	
	bg_frame ++;
	
	if(bg_frame > canvas.width)
		bg_frame = 0;

	ctx.fillStyle = "#000000";
	ctx.fillRect(0, canvas.height - local.config.y, canvas.width, local.config.y);

	drawHealth();

	if(player.fall_ == 0){
		if(jumpTriggered == 1)
			player.jump();

		player.run();
		head.draw();
		gun.draw();
	}

	// RUNNING SCORE +1
	if(frame % 20 == 0)
		if(frame != 0){
			score ++;
			document.getElementById("score").innerHTML = score;
		}

	updateEntities();
	if(player.blink == 0)
		checkIfPlayerCollides();
	checkIfPlayerFalls();
	checkIfEnitiesCrossCanvasLimits();
	checkIfBulletKills();

	if(player.fall_ == 1){
		head.fall();
		player.fall();
		gun.fall();
	}

	if(frame % 50 == 0){
		var randomEvent = Math.floor(Math.random() * 3);
		//var randomEvent = 2;
		switch(randomEvent){
			case 0 :
				friends.push({
					entity : new friend(canvas.width, local.config.y),
					pos : {
						x : canvas.width,
						y : local.config.y
					},
					status : 1,
					killFrame : 0,
					powx : 0,
					powy : 0,
					angle : 0
				});
				break;
			case 1 :
				enemies.push({
					entity : new enemy(canvas.width, local.config.y),
					pos : {
						x : canvas.width,
						y : local.config.y
					},
					status : 1,
					killFrame : 0,
					powx : 0,
					powy : 0,
					angle : 0
				});
				break;
			case 2 :
				gaps.push({
					entity : new gap(canvas.width),
					pos : {
						x : canvas.width
					}
				});
				break;
		}
	}
}

function loop(){
	if(gameOver == 0){
		draw();
		frame ++;
		if(jumpTriggered == 1)
			player.jump_f ++;
		requestAnimationFrame(loop);
	}else{
		exitScreen();
	}
}

music.addEventListener('ended', function() {
    this.currentTime = 0;
    this.play();
}, false);

/* TOUCH CONTROLS */
canvas.ontouchstart = function(e){
	let activeTouch;
	if(e.touches.length == 2)
		activeTouch = e.touches[1];
	else
		activeTouch = e.touches[0];
	if(activeTouch.clientX < canvas.width / 2)
		jumpTriggered = 1;
	else
		gun.fire();
}

/* KEYBOARD CONTROLS */
document.addEventListener("keypress",function(e){
	if(e.which == 102)
		if(gameOver == 0)
			gun.fire();
	if(e.which == 106)
		if(gameOver == 0)
			jumpTriggered = 1;
}, false);

document.addEventListener('touchmove', function(e){
	e.preventDefault()
}, {
	passive: false,
});

if(!head_.complete){
	window.location.reload();
}
</script>
